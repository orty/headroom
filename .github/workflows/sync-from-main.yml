name: Sync main-alpha from main

# Fires as soon as Pull updates `main` from upstream (chopratejas:main), then
# merges `main` into `main-alpha`. The push to main-alpha is authenticated with
# an SSH deploy key (secret SYNC_DEPLOY_KEY) rather than GITHUB_TOKEN, so the
# resulting push event DOES trigger the downstream workflows (alpha-release,
# mirror-upstream-release, ci, docker, ...). Pushes made with the default
# GITHUB_TOKEN are deliberately suppressed by GitHub and would not fire any of
# them, leaving the publish cascade stalled.
#
# Setup (one-time):
#   1. ssh-keygen -t ed25519 -f sync_deploy_key -N "" -C "sync-main-alpha"
#   2. Repo Settings -> Deploy keys -> Add deploy key
#        - paste sync_deploy_key.pub, tick "Allow write access"
#   3. Repo Settings -> Secrets and variables -> Actions -> New secret
#        - name: SYNC_DEPLOY_KEY, value: contents of the private sync_deploy_key

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main-alpha
          fetch-depth: 0
          # Deploy key (not GITHUB_TOKEN) so the push below triggers CI/CD.
          ssh-key: ${{ secrets.SYNC_DEPLOY_KEY }}

      - name: Merge main into main-alpha
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Only push if main has commits not yet in main-alpha
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main-alpha already up to date with main, nothing to do"
            exit 0
          fi
          git merge origin/main --no-edit --no-ff \
            -m "chore(sync): merge main into main-alpha"
          git push origin main-alpha
