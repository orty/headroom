name: Sync main-alpha from main

# Runs hourly and on demand. Fetches origin/main (kept clean with upstream
# via Pull app) and merges it into main-alpha, triggering the release mirror
# and ACA deploy cascade automatically.

on:
  schedule:
    - cron: '7 * * * *'   # hourly at :07, offset from peak
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main-alpha
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into main-alpha
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Only push if main has commits not yet in main-alpha
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main-alpha already up to date with main, nothing to do"
            exit 0
          fi
          git merge origin/main --no-edit --no-ff \
            -m "chore(sync): merge main into main-alpha"
          git push origin main-alpha
