name: Deploy to Azure Container Apps

# Triggers AFTER the Release workflow completes successfully (not on release
# published directly) so the Docker image is guaranteed to exist.
#
# Image routing:
# - Fork pre-release tag (contains -alpha/-beta/-rc): ghcr.io/orty/headroom:<tag>
# - Stable mirrored tag (e.g. v0.26.0): ghcr.io/chopratejas/headroom:<tag>
#
# REQUIRED SECRETS:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (empty = latest fork image)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  ACA_NAME: headroom
  ACA_RG: RG-SAR
  FORK_IMAGE: ghcr.io/orty/headroom
  UPSTREAM_IMAGE: ghcr.io/chopratejas/headroom

jobs:
  deploy:
    # Only deploy when Release workflow succeeded (or manual dispatch)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            [ -z "$TAG" ] && TAG="latest"
          else
            # workflow_run: head_branch holds the tag name for release-triggered runs
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi

          if echo "$TAG" | grep -qE '\-alpha|\-beta|\-rc'; then
            echo "image=${FORK_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${UPSTREAM_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          IMAGE="${{ steps.image.outputs.image }}"
          TAG="${{ steps.image.outputs.tag }}"
          TAG_SLUG=$(echo "${TAG}" | tr -cd 'a-z0-9' | cut -c1-5)
          EPOCH_TAIL=$(date +%s | tail -c 6)
          SUFFIX="${TAG_SLUG}${EPOCH_TAIL}"

          az containerapp update \
            --name "${ACA_NAME}" \
            --resource-group "${ACA_RG}" \
            --image "${IMAGE}" \
            --revision-suffix "${SUFFIX}"

          echo "✓ Deployed ${IMAGE} → revision suffix ${SUFFIX}"
