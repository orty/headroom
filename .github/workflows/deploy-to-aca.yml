name: Deploy to Azure Container Apps

# Release routing:
# - Fork pre-release (v0.26.1-alpha.2): deploys ghcr.io/orty/headroom:<tag>
#   (built and pushed by release.yml during the release run)
# - Mirrored stable release (v0.26.0): deploys ghcr.io/chopratejas/headroom:v0.26.0
#   (upstream image; fork doesn't rebuild stable releases)
#
# Deploy fires AFTER release is published — release.yml builds the image first,
# then the release event triggers this workflow.
#
# REQUIRED SECRETS (Settings → Secrets → Actions):
#   AZURE_CLIENT_ID        — App registration client ID (github-headroom-deploy SP)
#   AZURE_TENANT_ID        — powell-software.com tenant: dd4397fc-...
#   AZURE_SUBSCRIPTION_ID  — a2672c72-a1eb-4c84-aec5-0b01fc14696f

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (empty = latest)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  ACA_NAME: headroom
  ACA_RG: RG-SAR
  FORK_IMAGE: ghcr.io/orty/headroom
  UPSTREAM_IMAGE: ghcr.io/chopratejas/headroom

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            [ -z "$TAG" ] && TAG="latest"
            echo "image=${FORK_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            # Fork pre-release: use the image built by release.yml for this tag
            TAG="${{ github.event.release.tag_name }}"
            echo "image=${FORK_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Mirrored stable release: use upstream image (fork doesn't rebuild)
            TAG="${{ github.event.release.tag_name }}"
            echo "image=${UPSTREAM_IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          IMAGE="${{ steps.image.outputs.image }}"
          TAG_SLUG=$(echo "${IMAGE##*:}" | tr -cd 'a-z0-9' | cut -c1-5)
          EPOCH_TAIL=$(date +%s | rev | cut -c1-5)
          SUFFIX="${TAG_SLUG}${EPOCH_TAIL}"

          az containerapp update \
            --name "${ACA_NAME}" \
            --resource-group "${ACA_RG}" \
            --image "${IMAGE}" \
            --revision-suffix "${SUFFIX}"

          echo "✓ Deployed ${IMAGE} → revision suffix ${SUFFIX}"
